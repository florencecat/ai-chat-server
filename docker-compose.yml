services:
  ai-server:
    image: ghcr.io/${GITHUB_REPOSITORY:-florencecat/ai-chat-server}:latest
    container_name: ai-server
    restart: unless-stopped
    env_file: .env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./data:/app/data
    ports:
      - "127.0.0.1:8091:8091"
